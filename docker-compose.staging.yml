version: "3.9"

services:
  db-staging:
    image: postgres:15-alpine
    container_name: car_db_staging
    env_file:
      - .env.staging
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-staging:
    image: ghcr.io/prafalex/car-inventory-devops/backend:${BUILD_TAG}
    container_name: car_backend_staging
    env_file:
      - .env.staging
    ports:
      - "8001:8000"
    depends_on:
      db-staging:
        condition: service_healthy

  frontend-staging:
    image: ghcr.io/prafalex/car-inventory-devops/frontend:${BUILD_TAG}
    container_name: car_frontend_staging
    ports:
      - "3001:80"
    depends_on:
      - backend-staging

volumes:
  postgres_staging_data:
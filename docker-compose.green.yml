version: "3.9"

services:
  db-green:
    image: postgres:15-alpine
    container_name: car_db_green
    env_file:
      - .env.green
    volumes:
      - postgres_green_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-green:
    image: ghcr.io/prafalex/car-inventory-devops/backend:${BUILD_TAG}
    container_name: car_backend_green
    env_file:
      - .env.green
    ports:
      - "8003:8000"
    depends_on:
      db-green:
        condition: service_healthy

  frontend-green:
    image: ghcr.io/prafalex/car-inventory-devops/frontend:${BUILD_TAG}
    container_name: car_frontend_green
    environment:
      - BACKEND_HOST=backend-green
      - BACKEND_PORT=8000
    ports:
      - "3003:80"
    depends_on:
      - backend-green

volumes:
  postgres_green_data: